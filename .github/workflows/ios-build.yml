name: Build iOS App

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      build_signed_ipa:
        description: "Build and export a signed IPA"
        required: false
        type: boolean
        default: false
      build_unsigned_ipa:
        description: "Build an unsigned device IPA for later re-signing"
        required: false
        type: boolean
        default: false
      export_method:
        description: "IPA export method: development, ad-hoc, app-store, enterprise"
        required: false
        default: "development"

env:
  PROJECT: ShopCapture.xcodeproj
  SCHEME: ShopCapture
  CONFIGURATION: Release
  BUNDLE_IDENTIFIER: com.bully1990.shopcapture
  EXPORT_METHOD: ${{ inputs.export_method || 'development' }}

jobs:
  simulator-build:
    name: Build unsigned simulator app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package simulator app
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/"$CONFIGURATION"-iphonesimulator -maxdepth 1 -type d -name "$SCHEME.app" -print -quit)"
          test -n "$APP_PATH"
          mkdir -p build/artifacts
          ditto -c -k --keepParent "$APP_PATH" "build/artifacts/$SCHEME-simulator-app.zip"

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ShopCapture-simulator-app
          path: build/artifacts/ShopCapture-simulator-app.zip
          if-no-files-found: error
          retention-days: 14

  signed-ipa:
    name: Build signed IPA
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_signed_ipa }}
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing secrets
        run: |
          set -euo pipefail
          test -n "$BUILD_CERTIFICATE_BASE64"
          test -n "$P12_PASSWORD"
          test -n "$BUILD_PROVISION_PROFILE_BASE64"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$DEVELOPMENT_TEAM"

      - name: Install Apple certificate and provisioning profile
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin)"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "build/$SCHEME.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            clean archive

      - name: Create export options
        run: |
          set -euo pipefail
          mkdir -p build
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$DEVELOPMENT_TEAM</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_IDENTIFIER</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "build/$SCHEME.xcarchive" \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShopCapture-ipa
          path: build/export/*.ipa
          if-no-files-found: error
          retention-days: 14

  unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_unsigned_ipa }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned device app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/"$CONFIGURATION"-iphoneos -maxdepth 1 -type d -name "$SCHEME.app" -print -quit)"
          test -n "$APP_PATH"
          mkdir -p build/unsigned-ipa/Payload build/artifacts
          ditto "$APP_PATH" "build/unsigned-ipa/Payload/$SCHEME.app"
          (cd build/unsigned-ipa && zip -qry "../artifacts/$SCHEME-unsigned.ipa" Payload)

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShopCapture-unsigned-ipa
          path: build/artifacts/ShopCapture-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
