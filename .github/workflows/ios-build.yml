name: Build iOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PROJECT: ShopCapture.xcodeproj
  SCHEME: ShopCapture
  CONFIGURATION: Release

jobs:
  unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned device app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/"$CONFIGURATION"-iphoneos -maxdepth 1 -type d -name "$SCHEME.app" -print -quit)"
          test -n "$APP_PATH"
          mkdir -p build/unsigned-ipa/Payload build/artifacts
          ditto "$APP_PATH" "build/unsigned-ipa/Payload/$SCHEME.app"
          (cd build/unsigned-ipa && zip -qry "../artifacts/$SCHEME-unsigned.ipa" Payload)

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShopCapture-unsigned-ipa
          path: build/artifacts/ShopCapture-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
