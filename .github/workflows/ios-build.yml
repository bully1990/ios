name: Build iOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PROJECT: ShopCapture.xcodeproj
  SCHEME: ShopCapture
  CONFIGURATION: Release

jobs:
  unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned device app
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p build
          set +e
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY" \
            clean build 2>&1 | tee build/xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            summary="$(tail -n 80 build/xcodebuild.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            echo "::error title=xcodebuild failed::$summary"
            exit "$status"
          fi

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/"$CONFIGURATION"-iphoneos -maxdepth 1 -type d -name "$SCHEME.app" -print -quit)"
          test -n "$APP_PATH"
          mkdir -p build/unsigned-ipa/Payload build/artifacts
          ditto "$APP_PATH" "build/unsigned-ipa/Payload/$SCHEME.app"
          (cd build/unsigned-ipa && zip -qry "../artifacts/$SCHEME-unsigned.ipa" Payload)

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShopCapture-unsigned-ipa
          path: build/artifacts/ShopCapture-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
